<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{description}}">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="{{title}} | Casino Arena">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://casino-czech.cz/{{slug}}/">
    <meta property="og:image" content="https://casino-czech.cz/assets/images/logo.svg">
    <title>{{title}} | Casino Arena</title>
    <link rel="canonical" href="https://casino-czech.cz/{{slug}}/">
    <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/css/style.css?v=3">
    <style>.nav-menu{display:flex;gap:0;list-style:none;height:100%;align-items:center;margin:0;padding:0}.nav-menu>li{position:relative;height:100%;display:flex;align-items:center;list-style:none}.mega-dropdown{display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);z-index:9999}.nav-menu>li:hover>.mega-dropdown{display:block}.mega-dropdown ul{list-style:none;margin:0;padding:0}.mega-dropdown li{list-style:none}@media(max-width:900px){.nav-menu{display:none;flex-direction:column;width:100%;height:auto}.nav-menu.active{display:flex}.nav-menu>li{height:auto;flex-direction:column;align-items:stretch}.nav-menu>li:hover>.mega-dropdown{display:none}.mega-dropdown{position:static;transform:none}.nav-menu>li.open>.mega-dropdown{display:block!important}}</style>
</head>
<body>

{{nav_html}}

<div class="container">
    <div class="breadcrumb">
        <a href="/">Domů</a><span class="sep">›</span><a href="/nejlepsi-kasina-cz/">Kasina</a><span class="sep">›</span><span>{{title}}</span>
    </div>
</div>

<section class="hero" style="padding:50px 20px;">
    <div class="container">
        <h1>{{h1}}</h1>
        <p>{{intro}}</p>
    </div>
</section>

<section class="section">
    <div class="container">
        <h2 class="section-title">Top Kasina – {{title}}</h2>
        {{casino_cards}}
    </div>
</section>

<section class="seo-content">
    <div class="container">
        {{seo_content}}
    </div>
</section>

<section class="section">
    <div class="container">
        <h2 class="section-title">Často Kladené Otázky</h2>
        <div class="faq">
            {{faq_html}}
        </div>
    </div>
</section>

<section class="related-links">
    <div class="container">
        <h3>Další témata</h3>
        <div class="link-pills">
            {{related_html}}
        </div>
    </div>
</section>

{{footer_html}}

<script src="/assets/js/app.js"></script>
<script>
// Mobile menu
const navToggle = document.querySelector('.nav-toggle');
const navMenu = document.querySelector('.nav-menu');
if (navToggle) {
    navToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
}
document.querySelectorAll('.nav-menu > li > a').forEach(link => {
    if (link.querySelector('.arrow-down')) {
        link.addEventListener('click', function(e) {
            if (window.innerWidth <= 900) {
                e.preventDefault();
                this.parentElement.classList.toggle('open');
            }
        });
    }
});
</script>
</body>
</html>
