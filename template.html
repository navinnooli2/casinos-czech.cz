<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{description}}">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="{{title}} | Casinos Czech">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://casinos-czech.cz/{{slug}}/">
    <meta property="og:image" content="https://casinos-czech.cz/assets/images/logo.svg">
    <title>{{title}} | Casinos Czech .CZ</title>
    <link rel="canonical" href="https://casinos-czech.cz/{{slug}}/">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/css/style.css?v=31">
</head>
<body>

{{nav_html}}

<div class="container">
    {{breadcrumb}}
</div>

<div class="container">
    <div class="hero-card">
        <div class="hero-card-content">
            <h1>{{h1}}</h1>
            <p class="hero-card-intro">{{intro}}</p>
            <div class="hero-card-count">Více než <strong>{{casino_count}} kasin nalezeno.</strong></div>
        </div>
        <div class="hero-card-icons">{{hero_icons}}</div>
    </div>
</div>

<div class="container">
    {{author_box}}
</div>

<section class="section">
    <div class="container">
        <h2 class="section-title-with-count">Top kasin – {{title}} v ČR 2026</h2>
        {{casino_cards}}
    </div>
</section>

<div class="container">
    {{toc}}
</div>

<section class="seo-content">
    <div class="container">
        {{seo_content}}
    </div>
</section>

<section class="section">
    <div class="container">
        <h2 class="section-title">Často Kladené Otázky</h2>
        <div class="faq">
            {{faq_html}}
        </div>
    </div>
</section>

<section class="related-links">
    <div class="container">
        <h3>Další témata</h3>
        <div class="link-pills">
            {{related_html}}
        </div>
    </div>
</section>

{{footer_html}}

<script src="/assets/js/app.js?v=31"></script>
</body>
</html>
