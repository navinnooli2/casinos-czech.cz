<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110" width="520" height="110">
  <defs>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="35%" stop-color="#E8A817"/>
      <stop offset="65%" stop-color="#D4950F"/>
      <stop offset="100%" stop-color="#F5C842"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Roulette icon -->
  <g transform="translate(48, 48)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#gold2)" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="url(#gold2)" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="-24" x2="0" y2="-19" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="12" y1="-21" x2="9.5" y2="-16.5" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="21" y1="-12" x2="16.5" y2="-9.5" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="24" y1="0" x2="19" y2="0" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="21" y1="12" x2="16.5" y2="9.5" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="12" y1="21" x2="9.5" y2="16.5" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="24" x2="0" y2="19" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="-12" y1="21" x2="-9.5" y2="16.5" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="-21" y1="12" x2="-16.5" y2="9.5" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="-24" y1="0" x2="-19" y2="0" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="-21" y1="-12" x2="-16.5" y2="-9.5" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <line x1="-12" y1="-21" x2="-9.5" y2="-16.5" stroke="url(#gold2)" stroke-width="1" opacity="0.35"/>
    <polygon points="0,-12 9,0 0,12 -9,0" fill="url(#gold2)" filter="url(#glow2)"/>
    <circle cx="0" cy="-33" r="2" fill="#FFE17D" filter="url(#glow2)"/>
  </g>

  <!-- CASINOS -->
  <text x="100" y="46" font-family="'Georgia', 'Garamond', serif" font-size="40" font-weight="bold" letter-spacing="6" fill="url(#gold2)" filter="url(#glow2)">CASINOS</text>

  <!-- Line -->
  <line x1="102" y1="55" x2="430" y2="55" stroke="url(#gold2)" stroke-width="0.7" opacity="0.35"/>

  <!-- CZECH -->
  <text x="104" y="82" font-family="'Georgia', 'Garamond', serif" font-size="28" font-weight="normal" letter-spacing="20" fill="#FFFFFF" opacity="0.9">CZECH</text>

  <!-- .CZ badge -->
  <g transform="translate(340, 73)">
    <rect x="0" y="-12" width="32" height="18" rx="3" fill="none" stroke="url(#gold2)" stroke-width="1" opacity="0.45"/>
    <text x="16" y="2" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="10" font-weight="bold" letter-spacing="1" fill="url(#gold2)" opacity="0.65">.CZ</text>
  </g>

  <!-- Tagline -->
  <text x="104" y="103" font-family="'Helvetica Neue', sans-serif" font-size="8" letter-spacing="3.5" fill="#F5C842" opacity="0.45">NEJLEPŠÍ ONLINE KASINA V ČR</text>
</svg>
