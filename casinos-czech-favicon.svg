<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE17D"/>
      <stop offset="40%" stop-color="#F5C842"/>
      <stop offset="70%" stop-color="#D4950F"/>
      <stop offset="100%" stop-color="#F5C842"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="url(#fg)" stroke-width="1.5" opacity="0.3"/>

  <!-- Roulette wheel -->
  <circle cx="32" cy="30" r="22" fill="none" stroke="url(#fg)" stroke-width="2" opacity="0.35"/>
  <circle cx="32" cy="30" r="17" fill="none" stroke="url(#fg)" stroke-width="1" opacity="0.2"/>

  <!-- Wheel segments -->
  <line x1="32" y1="8" x2="32" y2="13" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="43" y1="11" x2="40.5" y2="15.5" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="19" x2="46" y2="21.5" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="54" y1="30" x2="49" y2="30" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="41" x2="46" y2="38.5" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="43" y1="49" x2="40.5" y2="44.5" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="52" x2="32" y2="47" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="21" y1="49" x2="23.5" y2="44.5" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="14" y1="41" x2="18" y2="38.5" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="10" y1="30" x2="15" y2="30" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="14" y1="19" x2="18" y2="21.5" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>
  <line x1="21" y1="11" x2="23.5" y2="15.5" stroke="url(#fg)" stroke-width="1" opacity="0.4"/>

  <!-- Central diamond -->
  <polygon points="32,20 40,30 32,40 24,30" fill="url(#fg)" filter="url(#gl)"/>
  <polygon points="32,24 37,30 32,36 27,30" fill="none" stroke="#1e1e3a" stroke-width="1" opacity="0.35"/>

  <!-- CZ text at bottom -->
  <text x="32" y="60" text-anchor="middle" font-family="'Georgia', serif" font-size="9" font-weight="bold" letter-spacing="2" fill="url(#fg)" opacity="0.7">CZ</text>
</svg>
